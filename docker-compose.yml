# Phase 1 Docker Compose SKELETON (D-10) — success criterion #4.
#
# Two services (web + worker) built from ONE image (the single Dockerfile),
# BOTH mounting the SAME named volume `appdata` at /data. That shared mount is
# what makes web-enqueue / worker-dequeue over one SQLite file work: app.db
# (+ -wal/-shm sidecars) and later uploads all live on /data. WAL requires a
# LOCAL volume on the SAME host — never NFS (PITFALLS #5/#9).
#
# SKELETON ONLY — full production hardening is Phase 8 (D-10):
#   - stop_grace_period tuning + SIGTERM/graceful-shutdown handling
#   - healthchecks, restart policies, PID1/tini init
#   - WAL checkpointing between campaigns, volume backup/persistence acceptance
#   - the worker built to a bundled worker.js (D-07) instead of `tsx`
# This file declares the correct service/volume TOPOLOGY and is valid compose;
# it is NOT a hardened production deployment.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Clerk NEXT_PUBLIC_* values are inlined by `next build` (Pitfall 3), so
      # they must reach the build stage as ARGs. Primary path on Coolify is the
      # "Build Variable" toggle (Assumption A2); this build.args block is the
      # fallback that passes the same host env through at build time. These are
      # client-safe. CLERK_SECRET_KEY is deliberately NOT here — it must never
      # enter a build arg or image layer (threat T-2-BUILD).
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/dashboard}
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/dashboard}
    image: mail-merge:skeleton
    command: ["sh", "-c", "npx tsx scripts/migrate.ts && node server.js"]
    environment:
      # Next.js standalone server must bind all interfaces in a container.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NODE_ENV: production
      # Single SQLite file on the shared /data volume.
      DATABASE_PATH: /data/app.db
      # Uploaded CSVs land under the SAME shared /data volume (durable across
      # restarts, reachable by the Phase-6 worker) — never the ephemeral
      # container FS. lib/csv/storage.ts creates /data/uploads on demand via
      # mkdirSync, so no extra volume/mount is needed (only this env var).
      UPLOADS_PATH: /data/uploads
      # AES-256-GCM master key — injected from the host env / Coolify secret at
      # runtime, NEVER inlined here or baked into the image (PITFALLS #1/#2).
      CREDENTIAL_ENC_KEY: ${CREDENTIAL_ENC_KEY}
      # Clerk server-only secret — RUNTIME injection only (never a build ARG,
      # never in an image layer). Mirrors CREDENTIAL_ENC_KEY handling.
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "3000:3000"
    volumes:
      - appdata:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: mail-merge:skeleton
    # Same image, different entrypoint (D-02). Phase 8 swaps tsx -> worker.js (D-07).
    command: ["npx", "tsx", "worker/index.ts"]
    environment:
      NODE_ENV: production
      # Same DB file as web — both processes open the one app.db on /data.
      DATABASE_PATH: /data/app.db
      CREDENTIAL_ENC_KEY: ${CREDENTIAL_ENC_KEY}
    volumes:
      - appdata:/data
    depends_on:
      - web

# One named local volume shared by both services at /data (same host, not NFS).
volumes:
  appdata:
